<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCS Mini Shop</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{background:#f6f6f6}
    header{background:#222;color:#fff;padding:15px;text-align:center}
    header h1{font-size:24px}
    header p{font-size:14px;opacity:.8}.container{padding:20px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{padding:15px;flex:1}
.card-content h3{font-size:16px;margin-bottom:6px}
.price{font-weight:bold;color:#c0392b;margin-bottom:10px}

.card button{
  background:#000;
  color:#fff;
  border:none;
  padding:12px;
  cursor:pointer;
  font-size:14px;
}
.card button:hover{background:#444}

footer{
  text-align:center;
  padding:15px;
  font-size:13px;
  color:#555;
}

/* Cart */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:12px 18px;
  border-radius:30px;
  font-size:14px;
}

  </style>
</head>
<body><header>
  <h1>SCS Beauty Store</h1>
  <p>By Atia Rehman</p>
</header><div class="container">
  <div class="grid"><div class="card">
  <img src="rose-facewash.jpg" alt="Rose Facewash">
  <div class="card-content">
    <h3>Rose Facewash</h3>
    <div class="price">Rs. 960 (120 gm)</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="cleanser.jpg" alt="Cleanser">
  <div class="card-content">
    <h3>Cleanser</h3>
    <div class="price">Rs. 1350 (100 gm)</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="hair-oil.jpg" alt="Hair Oil">
  <div class="card-content">
    <h3>Natural Growth Hair Oil</h3>
    <div class="price">Rs. 1092 (100 ml)</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="lip-balm.jpg" alt="Lip Balm">
  <div class="card-content">
    <h3>Lip Balm</h3>
    <div class="price">Rs. 312</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="anti-acne.jpg" alt="Anti Acne Facewash">
  <div class="card-content">
    <h3>Salicylic Anti Acne Facewash</h3>
    <div class="price">Rs. 804 (120 gm)</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="rose-gel-mask.jpg" alt="Rose Gel Mask">
  <div class="card-content">
    <h3>Rose Gel Mask</h3>
    <div class="price">Rs. 1080</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
  <img src="bloom-love.jpg" alt="Bloom Love Perfume">
  <div class="card-content">
    <h3>Bloom Love Perfume</h3>
    <div class="price">Rs. 2500 (50 ml)</div>
  </div>
  <button onclick="addToCart()">Add to Cart</button>
</div>

  </div>
</div><div class="cart" id="cart">Cart: <span id="count">0</span></div><footer>
  © 2026 SCS | Mini Shop
</footer><script>
  let count = 0;
  function addToCart(){
    count++;
    document.getElementById('count').innerText = count;
  }
</script></body>
</html>
